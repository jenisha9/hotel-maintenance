<!DOCTYPE html>
<html>
<head>
    <title>Hotel Maintenance AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>
            Finding maintenance issues humans miss with AI —
            before they become guest complaints.
        </h1>

        <p>
            Upload two inspection images for comparison.
        </p>

        <div class="upload-section">

            <div>
                <label>Reference Image</label>
                <input type="file">
            </div>

            <div>
                <label>Inspection Image</label>
                <input type="file">
            </div>

        </div>

        <textarea
            placeholder="Additional notes..."
            rows="5">
        </textarea>

        <button>
            Analyze Images
        </button>

        <div class="results">
            Results will appear here.
        </div>

    </div>

</body>
</html>
