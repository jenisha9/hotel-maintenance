<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Maintenance Inspector</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Maintenance Insights</h1>
        
        </div>
    </section>

    <section class="demo-card">

        <h2>Screw holes filled but surface left bumpy</h2>

        <div class="comparison-grid">

            <div class="image-card">
                <h3>Before</h3>
                <img src="before.jpg" alt="Before">
            </div>

            <div class="image-card">
                <h3>After</h3>
                <img src="after.jpg" alt="After">
            </div>

        </div>

    </section>

    <section class="demo-card">

        <h2>Mounting section repaired but visible crack in the panel</h2>

        <div class="comparison-grid">

            <div class="image-card">
                <h3>Before</h3>
                <img src="before1.jpg" alt="Before">
            </div>

            <div class="image-card">
                <h3>After</h3>
                <img src="after1.jpg" alt="After">
            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
